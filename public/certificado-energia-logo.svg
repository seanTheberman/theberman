      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="33%" stop-color="#ffcc00"/>
      <stop offset="66%" stop-color="#99cc33"/>
      <stop offset="100%" stop-color="#007f00"/>
    </linearGradient>
  </defs>
  
