          - text: Precisión en cada
          - text: Certificación.
        - paragraph [ref=e20]: Ayudamos a los propietarios de toda España a entender, mejorar y certificar la eficiencia energética de sus propiedades desde 2015.
      - generic [ref=e23]:
        - generic [ref=e24]:
          - heading "Nuestra Historia" [level=2] [ref=e26]
          - paragraph [ref=e27]: "Certificado Energético se fundó con un objetivo claro: aportar claridad profesional y rigor técnico al sector de la certificación energética en España. Detectamos que los propietarios y las empresas no solo buscaban un certificado; buscaban una hoja de ruta hacia un futuro más sostenible y rentable."
          - paragraph [ref=e28]: "Lo que comenzó como un equipo especializado en Madrid se ha convertido en una red nacional de certificadores acreditados. Nuestro crecimiento se apoya en la precisión, la integridad y un profundo conocimiento del parque edificado español. No solo medimos el rendimiento energético: lo interpretamos y ofrecemos recomendaciones prácticas que generan ahorros reales."
          - paragraph [ref=e29]: "Hoy, Certificado Energético es una referencia en consultoría energética en España. Hemos realizado con éxito más de 10.000 certificaciones, ayudando a familias y empresas a gestionar la complejidad de los certificados energéticos y las subvenciones de rehabilitación. Nuestra misión sigue siendo la misma: dar a nuestros clientes el conocimiento necesario para tomar decisiones informadas sobre la eficiencia energética de su propiedad."
          - paragraph [ref=e30]: Mirando al futuro, nos centramos en la innovación y la excelencia. Mejoramos continuamente nuestros procesos y nos mantenemos a la vanguardia de la tecnología energética para ofrecer el máximo nivel de servicio. En Certificado Energético creemos que una vivienda eficiente es la base de una España moderna y sostenible.
