              - heading "¿Qué es un Certificado Energético?" [level=3] [ref=e75]
              - img [ref=e77]
            - paragraph [ref=e81]: El Certificado de Eficiencia Energética (CEE) indica el nivel de eficiencia energética de una propiedad. Califica los edificios de la A (más eficiente) a la G (menos eficiente), de forma similar al etiquetado energético de los electrodomésticos.
          - generic [ref=e82] [cursor=pointer]:
            - generic [ref=e83]:
              - heading "¿Es obligatorio el Certificado Energético en España?" [level=3] [ref=e84]
              - img [ref=e86]
            - paragraph [ref=e90]: Sí. El certificado energético es obligatorio por ley para vender, alquilar o anunciar una propiedad en venta o en alquiler, con excepciones muy limitadas.
          - generic [ref=e91] [cursor=pointer]:
            - generic [ref=e92]:
              - heading "¿Cuánto cuesta un Certificado Energético?" [level=3] [ref=e93]
              - img [ref=e95]
            - paragraph [ref=e99]: El precio depende del tamaño y el tipo de propiedad. Los precios varían, por lo que comparar presupuestos de varios certificadores te ayuda a conseguir el mejor precio.
          - generic [ref=e100] [cursor=pointer]:
            - generic [ref=e101]:
              - heading "¿Cuánto dura la inspección?" [level=3] [ref=e102]
              - img [ref=e104]
            - paragraph [ref=e108]: La inspección en la propiedad suele durar entre 1 y 3 horas, según su tamaño.
          - generic [ref=e109] [cursor=pointer]:
            - generic [ref=e110]:
