            - heading "¿Qué es una Cookie?" [level=2] [ref=e30]
          - paragraph [ref=e32]: Una cookie es un pequeño fragmento de datos que un sitio web envía y que se almacena en tu ordenador a través de tu navegador mientras navegas por nuestro sitio. Las cookies fueron diseñadas como un mecanismo fiable para que los sitios recuerden información (como los artículos añadidos al carrito en una tienda online) o registren la actividad del usuario (pulsar botones, iniciar sesión, o registrar qué páginas se han visitado). También pueden recordar información introducida previamente en formularios, como nombres, direcciones, contraseñas o datos de pago.
