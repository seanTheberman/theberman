        - generic [ref=e72]:
          - generic [ref=e73] [cursor=pointer]:
            - generic [ref=e74]:
              - heading "What is a BER Certificate?" [level=3] [ref=e75]
              - img [ref=e77]
            - paragraph [ref=e81]: A BER (Building Energy Rating) Certificate shows how energy efficient a property is. It rates buildings from A (most efficient) to G (least efficient), similar to appliance energy labels.
          - generic [ref=e82] [cursor=pointer]:
            - generic [ref=e83]:
              - heading "Is a BER Certificate mandatory in Ireland?" [level=3] [ref=e84]
              - img [ref=e86]
            - paragraph [ref=e90]: Yes. A BER certificate is legally required when a property is sold, rented, or advertised for sale or rent, with limited exemptions.
          - generic [ref=e91] [cursor=pointer]:
            - generic [ref=e92]:
              - heading "How much does a BER Certificate cost?" [level=3] [ref=e93]
              - img [ref=e95]
            - paragraph [ref=e99]: The cost depends on the size and type of the property. Prices vary, which is why comparing quotes from multiple assessors helps you get the best price.
          - generic [ref=e100] [cursor=pointer]:
            - generic [ref=e101]:
              - heading "How long does a BER assessment take?" [level=3] [ref=e102]
              - img [ref=e104]
            - paragraph [ref=e108]: The on-site assessment usually takes 1–3 hours, depending on the property size.
          - generic [ref=e109] [cursor=pointer]:
            - generic [ref=e110]:
              - heading "How long is a BER Certificate valid for?" [level=3] [ref=e111]
              - img [ref=e113]
            - paragraph [ref=e117]: A BER certificate is valid for 10 years, unless major changes are made to the property that affect energy performance.
          - generic [ref=e118] [cursor=pointer]:
            - generic [ref=e119]:
              - heading "How do I get a BER Certificate?" [level=3] [ref=e120]
              - img [ref=e122]
            - paragraph [ref=e126]: You book a SEAI-registered BER assessor, they visit and assess your property, and your certificate is issued and registered with SEAI.
          - generic [ref=e127] [cursor=pointer]:
            - generic [ref=e128]:
              - heading "Can I choose my assessment date and time?" [level=3] [ref=e129]
              - img [ref=e131]
            - paragraph [ref=e135]: Yes. You can select a preferred date and time when booking through the platform.
          - generic [ref=e136] [cursor=pointer]:
            - generic [ref=e137]:
              - heading "Are BER assessors registered and trusted?" [level=3] [ref=e138]
              - img [ref=e140]
            - paragraph [ref=e144]: Yes. All BER assessments are carried out by SEAI-registered assessors who follow an official code of practice.
          - generic [ref=e145] [cursor=pointer]:
            - generic [ref=e146]:
              - heading "What happens if I get a bad rating?" [level=3] [ref=e147]
              - img [ref=e149]
            - paragraph [ref=e153]: A bad rating does not prevent you from selling. It simply informs the buyer. Our advisory report will suggest ways to improve it.
