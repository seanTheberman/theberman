<html lang="en">

<head>

  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-57CD932S');</script>
  <!-- End Google Tag Manager -->

  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script>
    (function() {
      var host = location.hostname;
      var isEng = /epccert/.test(host);
      var isEsp = /certificadoenergético|certificadosenergetico/.test(host);
      var isFra = /dpefrance/.test(host);
      var isPor = /certificadoenergia/.test(host);

      var title, desc, locale, siteName, baseUrl, ogImage;
      if (isEng) {
        siteName = "EPC Cert";
        baseUrl = "https://www.epccert.com";
        ogImage = "https://www.epccert.com/logo.png";
        title = "EPC Certificate England | Domestic & Commercial EPC";
        desc = "Book Accredited EPC Assessments Across England. Fast Domestic and Commercial EPC Certificates with Competitive Pricing and Nationwide Coverage";
        locale = "en_GB";
      } else if (isEsp) {
        siteName = "Certificado Energético";
        baseUrl = "https://certificadoenergético.eu";
        ogImage = "https://certificadoenergético.eu/logo.png";
        title = "Certificado Energético – La Mayor Plataforma de España | Certificados Energéticos";
        desc = "La mayor plataforma de certificados energéticos de España. Obtén presupuestos de certificadores acreditados y reserva online al instante.";
        locale = "es_ES";
      } else if (isFra) {
        siteName = "DPE France";
        baseUrl = "https://dpefrance.eu";
        ogImage = "https://dpefrance.eu/logo.png";
        title = "DPE France – Diagnostic de Performance Énergétique | DPE & Certificats";
        desc = "Plateforme leader de DPE en France. Obtenez votre diagnostic de performance énergétique rapidement avec des experts certifiés.";
        locale = "fr_FR";
      } else if (isPor) {
        siteName = "Certificado Energia";
        baseUrl = "https://certificadoenergia.com";
        ogImage = "https://certificadoenergia.com/certificado-energia-logo.svg";
        title = "Certificado Energia Portugal | Certificados de Eficiência Energética";
        desc = "A plataforma líder de certificação energética em Portugal. Obtenha o seu certificado de eficiência energética com peritos certificados.";
        locale = "pt_PT";
      } else {
        siteName = "The BER Man";
        baseUrl = "https://www.theberman.eu";
        ogImage = "https://www.theberman.eu/logo.svg";
        title = "BER Cert Ireland | The BER Man";
        desc = "Need a BER Cert in Ireland? The BER Man Connects You with Local, SEAI-Registered Assessors Nationwide. Get a Free Quote Online Today!";
        locale = "en_IE";
      }

      document.title = title;
      document.documentElement.lang = isEsp ? 'es' : isEng ? 'en' : isFra ? 'fr' : isPor ? 'pt' : 'en';

      // Update favicon for the current tenant
      var favicon = document.querySelector('link[rel="icon"]');
      if (favicon) {
        favicon.href = isPor ? '/certificado-energia-logo.svg' : (isEsp ? '/certificado-logo-trimmed.png' : (isEng ? '/epc-logo-trimmed.png' : '/logo.svg'));
      }

      // Create Helmet-tracked (data-rh) default tags so non-JS crawlers get
      // tenant-correct values, and react-helmet-async REPLACES them in place
      // (instead of duplicating) once it mounts per-page.
      function rhMeta(keyAttr, key, val) {
        var m = document.createElement('meta');
        m.setAttribute(keyAttr, key);
        m.setAttribute('content', val);
        m.setAttribute('data-rh', 'true');
        document.head.appendChild(m);
      }
      rhMeta('name', 'description', desc);
      rhMeta('name', 'author', siteName);
      rhMeta('property', 'og:type', 'website');
      rhMeta('property', 'og:title', title);
      rhMeta('property', 'og:description', desc);
      rhMeta('property', 'og:site_name', siteName);
      rhMeta('property', 'og:url', baseUrl + '/');
      rhMeta('property', 'og:image', ogImage);
      rhMeta('property', 'og:locale', locale);
      rhMeta('name', 'twitter:card', 'summary_large_image');
      rhMeta('name', 'twitter:title', title);
      rhMeta('name', 'twitter:description', desc);
      rhMeta('name', 'twitter:image', ogImage);
      var canon = document.createElement('link');
      canon.setAttribute('rel', 'canonical');
      canon.setAttribute('href', baseUrl + '/');
      canon.setAttribute('data-rh', 'true');
      document.head.appendChild(canon);
    })();
  </script>

  <!-- Fallback title (overridden by inline script + react-helmet-async per-page). -->
  <!-- SEO meta tags (description, canonical, Open Graph, Twitter) are created with
       data-rh by the inline script above and managed per-page by react-helmet-async. -->
  <title>Energy Rating Certificates & Assessments</title>
  <meta name="keywords" content="energy certificate, energy rating, building energy rating, assessor, home energy, energy assessment" />
  <meta name="theme-color" content="#007F00" />

  <!-- Preconnect to image CDN -->
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
  <link rel="dns-prefetch" href="https://images.unsplash.com">

  <!-- Preload critical logo -->
  <link rel="preload" href="/logo.svg" as="image" type="image/svg+xml">

  <!-- Fonts: non-blocking load with display=swap -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap">
  </noscript>
</head>
