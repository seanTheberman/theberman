  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script>
    (function() {
      var host = location.hostname;
      var isEng = /epccert/.test(host);
      var isEsp = /certificado/.test(host);
      var isFra = /dpefrance/.test(host);
      var isPor = /certificadopt/.test(host);

      var title, desc, locale, siteName, baseUrl, ogImage;
      if (isEng) {
        siteName = "EPC Cert";
        baseUrl = "https://epccert.com";
        ogImage = "https://epccert.com/logo.png";
        title = "EPC Cert – England's Leading EPC Platform | EPC Certificates & Energy Ratings";
        desc = "England's leading EPC platform. Get fast, reliable EPC certificates from accredited assessors nationwide. Compare quotes and book online instantly.";
        locale = "en_GB";
      } else if (isEsp) {
        siteName = "Certificado Energético";
        baseUrl = "https://certificadoenergético.eu";
        ogImage = "https://certificadoenergético.eu/logo.png";
        title = "Certificado Energético – La Mayor Plataforma de España | Certificados Energéticos";
        desc = "La mayor plataforma de certificados energéticos de España. Obtén presupuestos de certificadores acreditados y reserva online al instante.";
        locale = "es_ES";
      } else if (isFra) {
        siteName = "DPE France";
        baseUrl = "https://dpefrance.eu";
        ogImage = "https://dpefrance.eu/logo.png";
        title = "DPE France – Diagnostic de Performance Énergétique | DPE & Certificats";
        desc = "Plateforme leader de DPE en France. Obtenez votre diagnostic de performance énergétique rapidement avec des experts certifiés.";
        locale = "fr_FR";
      } else if (isPor) {
        siteName = "Certificado Energético";
        baseUrl = "https://certificadopt.eu";
        ogImage = "https://certificadopt.eu/logo.png";
        title = "Certificado Energético Portugal | Certificados de Eficiência Energética";
        desc = "Plataforma líder de certificados energéticos em Portugal. Obtenha o seu certificado de eficiência energética com avaliadores certificados.";
        locale = "pt_PT";
      } else {
        siteName = "The Berman";
        baseUrl = "https://theberman.eu";
        ogImage = "https://theberman.eu/logo.png";
        title = "The Berman – Ireland's Largest BER Website | BER Certificates & Energy Ratings";
        desc = "Ireland's largest BER website. Get fast, reliable BER certificates from 100+ SEAI-registered assessors nationwide. Compare quotes and book online instantly.";
        locale = "en_IE";
      }

      document.title = title;
      document.documentElement.lang = isEsp ? 'es' : isEng ? 'en' : isFra ? 'fr' : isPor ? 'pt' : 'en';

      function setMeta(sel, attr, val) {
        var el = document.querySelector(sel);
        if (el) el.setAttribute(attr, val);
      }
      setMeta('meta[name="description"]', 'content', desc);
      setMeta('meta[property="og:title"]', 'content', title);
      setMeta('meta[property="og:description"]', 'content', desc);
      setMeta('meta[property="og:site_name"]', 'content', siteName);
      setMeta('meta[property="og:url"]', 'content', baseUrl + '/');
      setMeta('meta[property="og:image"]', 'content', ogImage);
      setMeta('meta[property="og:locale"]', 'content', locale);
      setMeta('meta[name="twitter:title"]', 'content', title);
      setMeta('meta[name="twitter:description"]', 'content', desc);
      setMeta('meta[name="twitter:image"]', 'content', ogImage);
      setMeta('link[rel="canonical"]', 'href', baseUrl + '/');
      setMeta('meta[name="author"]', 'content', siteName);
    })();
  </script>
